# ─────────────────────────────────────────────────────────────────────────────
# GlucoCheck — Docker Compose para ejecución local
# Uso: docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:

  # ── Backend (FastAPI + modelo ML) ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glucocheck-backend
    ports:
      - "8000:8000"
    volumes:
      # Persiste los artefactos del modelo entre reinicios del contenedor
      - ./data/processed:/app/data/processed
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend (nginx sirviendo index.html) ──────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: glucocheck-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
